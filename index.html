<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Match3 Ultimate</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffb6f0,#a0cfff);
  text-align:center;
}

/* ===== 画面 ===== */
.screen{
  display:none;
}
.active{
  display:block;
}

/* ===== タイトル ===== */
h1{
  color:white;
  margin:20px;
}

/* ===== UI ===== */
.ui{
  display:flex;
  justify-content:space-between;
  width:300px;
  margin:0 auto;
  color:white;
  font-weight:bold;
}

/* ===== ボタン ===== */
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin:10px;
}

/* ===== キャンバス ===== */
canvas{
  margin-top:10px;
  border-radius:20px;
  background:rgba(255,255,255,0.2);
  touch-action: none;
}

/* ===== スコアぽよん ===== */
.scorePop{
  animation:pop 0.3s;
}
@keyframes pop{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<!-- ===== タイトル画面 ===== -->
<div id="title" class="screen active">
  <h1>🍬 Match3 Ultimate</h1>
  <button onclick="startGame()">START</button>
</div>

<!-- ===== ゲーム画面 ===== -->
<div id="gameScreen" class="screen">
  <h1>🍬 Match3</h1>

  <div class="ui">
    <div id="score">0</div>
    <div id="moves">30</div>
  </div>
  <div class="ui">
    <div id="best">BEST:0</div>
  </div>

  <canvas id="game" width="300" height="300"></canvas>

  <button onclick="toggleSkin()">スキン切替</button>
</div>

<!-- ===== ゲームオーバー ===== -->
<div id="gameOver" class="screen">
  <h1>GAME OVER</h1>
  <div id="finalScore"></div>
  <button onclick="location.reload()">RETRY</button>
</div>

<script>
// ===== 素材 =====
const skins = {
  candy:{
    red:"assets/red.png",
    blue:"assets/blue.png",
    green:"assets/green.png",
    yellow:"assets/yellow.png",
    purple:"assets/purple.png",
    bomb:"assets/bomb.png"
  }
};

let imgs={};
function loadImages(callback){
  let loaded = 0;
  const keys = Object.keys(skins.candy);

  keys.forEach(k=>{
    imgs[k] = new Image();
    imgs[k].src = skins.candy[k];

    imgs[k].onload = ()=>{
      loaded++;
      if(loaded === keys.length) callback();
    };
  });
}

const sound=new Audio("assets/pop.mp3");

// ===== 状態 =====
const size=6, cell=50;
let board=[], score=0, moves=30;
let selected=null;
let dragging=false;
let swapAnim=null;
let combo=0;
let particles=[];
let shake=0;

// ===== 初期化 =====
function rand(){
  return Math.random()<0.05?"bomb":
  ["red","blue","green","yellow","purple"][Math.floor(Math.random()*5)];
}

function init(){
  for(let y=0;y<size;y++){
    board[y]=[];
    for(let x=0;x<size;x++){
      board[y][x]=rand();
    }
  }
}

// ===== 描画 =====
const c=document.getElementById("game");
const ctx=c.getContext("2d");

function draw(){
  ctx.clearRect(0,0,300,300);
  ctx.save();

  // シェイク
  if(shake>0){
    ctx.translate((Math.random()-0.5)*8,(Math.random()-0.5)*8);
    shake--;
  }

  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){

      let px=x*cell+10;
      let py=y*cell+10;

      // アニメ中なら位置補正
      if(swapAnim){
        let a=swapAnim;
        let t=easeOut(a.progress);

        if(x===a.x1 && y===a.y1){
          px += (a.x2-a.x1)*cell*t;
          py += (a.y2-a.y1)*cell*t;
        }
        if(x===a.x2 && y===a.y2){
          px += (a.x1-a.x2)*cell*t;
          py += (a.y1-a.y2)*cell*t;
        }
      }

      let b=board[y][x];
      if(b){
        ctx.drawImage(imgs[b],px,py,40,40);
      }
    }
  }

  ctx.restore();
}

// ===== イージング =====
function easeOut(t){
  return 1-(1-t)*(1-t);
}

// ===== スワップアニメ =====
function animateSwap(x1,y1,x2,y2,valid){
  swapAnim={
    x1,y1,x2,y2,
    progress:0,
    valid
  };
}

// ===== 更新 =====
function updateAnim(){
  if(!swapAnim) return;

  swapAnim.progress += 0.1;

  if(swapAnim.progress>=1){

    let a=swapAnim;

    // 実際に交換
    let t=board[a.y1][a.x1];
    board[a.y1][a.x1]=board[a.y2][a.x2];
    board[a.y2][a.x2]=t;

    swapAnim=null;

    // マッチ確認
    if(find().length>0){
      update();
    }else if(a.valid){
      // 失敗なら戻す
      animateSwap(a.x2,a.y2,a.x1,a.y1,false);
    }
  }
}

// ===== マッチ =====
function find(){
  let r=[];
  for(let y=0;y<size;y++){
    for(let x=0;x<size-2;x++){
      let c=board[y][x];
      if(c && c===board[y][x+1] && c===board[y][x+2]){
        r.push({x,y},{x:x+1,y},{x:x+2,y});
      }
    }
  }
  for(let x=0;x<size;x++){
    for(let y=0;y<size-2;y++){
      let c=board[y][x];
      if(c && c===board[y+1][x] && c===board[y+2][x]){
        r.push({x,y},{x,y:y+1},{x,y:y+2});
      }
    }
  }
  return r;
}

// ===== 消し =====
function remove(m){
  combo++;
  shake+=5;

  m.forEach(p=>{
    board[p.y][p.x]=null;

    // パーティクル
    for(let i=0;i<10;i++){
      particles.push({
        x:p.x*cell+30,
        y:p.y*cell+30,
        vx:(Math.random()-0.5)*4,
        vy:(Math.random()-0.5)*4,
        life:30
      });
    }
  });

  sound.currentTime=0;
  sound.play();
}

// ===== 落下 =====
function drop(){
  for(let x=0;x<size;x++){
    for(let y=size-1;y>=0;y--){
      if(!board[y][x]){
        for(let k=y-1;k>=0;k--){
          if(board[k][x]){
            board[y][x]=board[k][x];
            board[k][x]=null;
            break;
          }
        }
      }
    }
  }
}

// ===== 補充 =====
function fill(){
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      if(!board[y][x]) board[y][x]=rand();
    }
  }
}

// ===== ゲーム更新 =====
function update(){
  let m=find();
  if(m.length){
    remove(m);
    drop();
    fill();
    setTimeout(update,200);
  }else{
    combo=0;
  }
}

// ===== 入力（PC+スマホ統合🔥）=====
let start=null;

function handleStart(x,y){
  start={x,y};
}

function handleMove(x,y){
  if(!start || swapAnim) return;

  let dx=x-start.x;
  let dy=y-start.y;

  if(Math.abs(dx)+Math.abs(dy)===1){
    animateSwap(start.x,start.y,x,y,true);
    start=null;
  }
}

// PC
c.addEventListener("mousedown",e=>{
  handleStart(
    Math.floor(e.offsetX/cell),
    Math.floor(e.offsetY/cell)
  );
});
c.addEventListener("mousemove",e=>{
  handleMove(
    Math.floor(e.offsetX/cell),
    Math.floor(e.offsetY/cell)
  );
});
c.addEventListener("mouseup",()=>start=null);

// スマホ
c.addEventListener("touchstart",e=>{
  let r=c.getBoundingClientRect();
  let t=e.touches[0];
  handleStart(
    Math.floor((t.clientX-r.left)/cell),
    Math.floor((t.clientY-r.top)/cell)
  );
});
c.addEventListener("touchmove",e=>{
  let r=c.getBoundingClientRect();
  let t=e.touches[0];
  handleMove(
    Math.floor((t.clientX-r.left)/cell),
    Math.floor((t.clientY-r.top)/cell)
  );
});
c.addEventListener("touchend",()=>start=null);

// ===== ループ =====
function loop(){
  draw();
  updateAnim();

  // パーティクル
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.2;
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);

  requestAnimationFrame(loop);
}

function startGame(){
  loadImages(()=>{
    show("gameScreen");
    init();

    // 初回だけループ開始
    if(!window.started){
      loop();
      window.started = true;
    }
  });
}

function show(id){
  document.querySelectorAll(".screen").forEach(el=>{
    el.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
