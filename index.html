<!DOCTYPE html>
<html lang="ja">
<head>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PUZZLE GAME</title>

<style>
body{
  margin:0;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:linear-gradient(135deg,#ffb6f0,#a0cfff);
  text-align:center;
  font-family:sans-serif;
  overscroll-behavior: none;
}
/* タイトル画面 */
#title{
  height:100vh;

  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#gameScreen{
  flex-direction:column;
  align-items:center;
}


.screen{
  display:none;
  position:absolute;   /* ✅ 追加 */
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.screen.active{
  display:flex;        /* ✅ blockじゃなくflex */
  justify-content:center;
  align-items:center;
}

/* ❌ overlayからdisplay:flex削除 */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);

  justify-content:center;
  align-items:center;
}

/* ✅ activeのときだけ表示 */
.overlay.active{
  display:flex;
}

h1{
  color:white;
  font-size:32px;
  margin-bottom:20px;
}

.ui{
  display:flex;
  justify-content:space-between;
  width:300px;
  margin:0 auto;
  color:white;
  font-weight:bold;
}

canvas{
  margin-top:10px;
  border-radius:20px;
  background:rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  touch-action: none
}

#combo{
  color:white;
  font-size:20px;
}

#gear{
  position:absolute;
  top:10px;
  right:10px;
  font-size:20px;
}

.box{
  background:white;
  padding:25px;
  border-radius:15px;
  width:260px;

  display:flex;
  flex-direction:column;
  gap:12px;
}

/* タイトル */
.box h2{
  margin:0;
}

/* 説明 */
.desc{
  font-size:14px;
  color:#555;
  margin-bottom:10px;
}

/* メニューボタン */
.menuBtn{
  width:100%;
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:12px;

  background:linear-gradient(135deg,#6ea8ff,#9fd3ff);
  color:white;

  transition:0.2s;
}

/* 押したとき */
.menuBtn:active{
  transform:scale(0.95);
}

/* 戻るだけ色変える */
.menuBtn.cancel{
  background:#ddd;
  color:black;
}

button{
  padding:12px 24px;
  border:none;
  border-radius:20px;
  margin:10px;
  font-size:16px;

  background:rgba(255,255,255,0.8);
  backdrop-filter: blur(5px);

  transition:0.2s;
}

button:active{
  transform:scale(0.9);
}

/* リザルト画面 */
#result{
  justify-content:center;
  align-items:center;
}

/* メインカード */
.resultBox{
  background:rgba(255,255,255,0.25);
  backdrop-filter: blur(15px);

  padding:40px;
  border-radius:20px;
  width:300px;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

#result.active{
  display:flex;
}

/* スコア */
.scoreText{
  font-size:24px;
  font-weight:bold;
  color:white;
}

/* ランキング */
.rankText{
  color:white;
  font-size:16px;
  line-height:1.5;
  text-align:center;
}

/* ボタン並び */
.resultButtons{
  display:flex;
  gap:15px;
}

.resultBox h1{
  font-size:36px;
}

.scoreText{
  color:#fff;
  text-shadow:0 0 10px rgba(255,255,255,0.8);
}

.resultButtons button{
  border-radius:25px;
  padding:10px 20px;
}

/* confirm専用 */
.confirmBox{
  width:260px;
  padding:25px;
  gap:20px;
}

/* テキスト余白調整 */
.confirmBox .desc{
  margin:0;
  text-align:center;
  line-height:1.6;
}

/* ボタン横並び */
.confirmButtons{
  display:flex;
  gap:10px;
  width:100%;
}

/* ベース */
.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  transition:0.15s;
}

/* はい */
.btn.yes{
  background:linear-gradient(135deg,#ff6b6b,#ff9b9b);
  color:white;
}

/* いいえ */
.btn.no{
  background:#ddd;
}

/* 押したとき */
.btn:active{
  transform:scale(0.9);
}

</style>
</head>

<body>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<div id="title" class="screen active">
  <h1>PUZZLE GAME</h1>
  <div id="globalRank"></div>

  <input id="name" placeholder="名前を入力" maxlength="10">
  <button onclick="startGame()">START</button>
</div>

<div id="gameScreen" class="screen">
  <h1>PUZZLE GAME</h1>

  <div class="ui">
    <div id="score">Score:0</div>
    <div id="moves">Moves:30</div>
  </div>
  <div id="combo"></div>

  <button id="gear" onclick="openMenu()">⚙</button>

  <canvas id="game" width="300" height="300"></canvas>
</div>

<div id="menu" class="screen overlay">
  <div class="box">
    <h2>メニュー</h2>

    <p class="desc">操作を選んでください</p>

    <button class="menuBtn" onclick="confirmAction('retry')">
      🔄 やり直す
    </button>

    <button class="menuBtn" onclick="confirmAction('title')">
      🏠 タイトルへ
    </button>

    <button class="menuBtn cancel" onclick="show('gameScreen')">
      ↩ 戻る
    </button>
  </div>
</div>


<!-- ✅ 外に出す -->
<div id="confirm" class="screen overlay">
  <div class="box confirmBox">
    <h2>確認</h2>

    <p id="confirmText" class="desc"></p>

    <div class="confirmButtons">
      <button class="btn yes" onclick="doAction()">はい</button>
      <button class="btn no" onclick="backMenu()">いいえ</button>
    </div>
  </div>
</div>

<div id="result" class="screen">
  <div class="resultBox">
    <h1>RESULT</h1>

    <div id="final" class="scoreText"></div>

    <div id="rank" class="rankText"></div>

    <div class="resultButtons">
      <button onclick="retryGame()">RETRY</button>
      <button onclick="goTitle()">タイトルへ</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCfDeRotfmLbzPxFOcb3pOIx41fUzofwR8",
  authDomain: "puzzle-game-af891.firebaseapp.com",
  databaseURL:"https://puzzle-game-af891-default-rtdb.firebaseio.com/",
  projectId: "puzzle-game-af891",
  storageBucket: "puzzle-game-af891.firebasestorage.app",
  messagingSenderId: "57733853912",
  appId: "1:57733853912:web:e42b7a96e50b9ca77d1dad",
  measurementId: "G-1SSQNNMKC8"
};


firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("scores").on("value", snapshot => {

  let data = snapshot.val();

  let text = "🌍 GLOBAL RANK\n";

  if(!data){
    text += "まだスコアなし";
  } else {

    let arr = Object.values(data);
    arr.sort((a,b)=>b.score-a.score);

    arr.slice(0,5).forEach((v,i)=>{
    text += (i+1) + ". " + v.name + " : " + v.score + "\n";
  });


  }

  document.getElementById("globalRank").innerText = text;
});


let started = false;

let playerName = "";

function startGame(){

  
  const name = document.getElementById("name").value.trim();

  if(!name){
    alert("名前を入力してください！");
    return;
  }

  playerName = name;

  localStorage.setItem("playerName", name);


  // ✅ 状態リセット
  score = 0;
  moves = 30;
  combo = 0;
  isGameOver = false;

  // ✅ UIリセット
  document.getElementById("score").innerText = "Score:0";
  document.getElementById("moves").innerText = "Moves:30";
  document.getElementById("combo").innerText = "";

  // ✅ 盤面初期化
  init();

  // ✅ 画面切り替え
  show("gameScreen");

    
  if(!started){
      loop();
      started = true;
    }
}


function retryGame(){

  // ✅ 状態リセット
  score = 0;
  moves = 30;
  combo = 0;
  isGameOver = false;

  // ✅ 盤面作り直し
  init();

  // ✅ UIリセット
  document.getElementById("score").innerText = "Score:0";
  document.getElementById("moves").innerText = "Moves:30";
  document.getElementById("combo").innerText = "";

  // ✅ ゲーム画面に戻る
  show("gameScreen");
}

function goTitle(){

  // ✅ 状態リセット
  score = 0;
  moves = 30;
  combo = 0;
  isGameOver = false;

  // ✅ UIリセット
  document.getElementById("score").innerText = "Score:0";
  document.getElementById("moves").innerText = "Moves:30";
  document.getElementById("combo").innerText = "";

  // ✅ タイトルへ
  show("title");
}

let tempAction = null;

// 歯車→メニュー
function openMenu(){
  show("menu");
}

// 押した選択を保存
function confirmAction(type){
  tempAction = type;
  show("confirm");
}

// 「いいえ」
function backMenu(){
  show("menu");
}

// 「はい」
function doAction(){

  console.log("実行:", tempAction); // ✅ デバッグ

  if(tempAction === "retry"){
    retryGame();
    return;
  }

  if(tempAction === "title"){
    goTitle();
    return;
  }

  console.log("⚠ 未定義:", tempAction);
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function gameOver(){
  isGameOver = true;

  show("result");

  document.getElementById("final").innerText =
    "Score: " + score;

  // ローカルランキング
  let r = JSON.parse(localStorage.getItem("rank") || "[]");
  r.push(score);
  r.sort((a,b)=>b-a);
  r = r.slice(0,5);
  localStorage.setItem("rank", JSON.stringify(r));

  // ✅ ここ追加！！
  db.ref("scores").push({
  name: playerName,
  score: score,
  time: Date.now()
});
}

// ===== 素材 =====
const imgs={
 red:new Image(),blue:new Image(),
 green:new Image(),yellow:new Image(),
 purple:new Image(),bomb:new Image()
};

imgs.red.src="assets/red.png";
imgs.blue.src="assets/blue.png";
imgs.green.src="assets/green.png";
imgs.yellow.src="assets/yellow.png";
imgs.purple.src="assets/purple.png";
imgs.bomb.src="assets/bomb.png";

const sound=new Audio("assets/pop.mp3");

// ===== 状態 =====
const size=6,cell=50;
const colors=["red","blue","green","yellow","purple"];

let comboTimer = 0;

let board=[],score=0,moves=30,combo=0;
let swapAnim=null,fallAnim=[];
let flash=0,shake=0;

// ===== 初期化 =====
function rand(){
  return colors[Math.floor(Math.random()*colors.length)];
}

function hasMove(){

  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){

      // 右と入れ替え
      if(x < size-1){
        swap(x,y,x+1,y);
        if(find().matches.length){
          swap(x,y,x+1,y);
          return true;
        }
        swap(x,y,x+1,y);
      }

      // 下と入れ替え
      if(y < size-1){
        swap(x,y,x,y+1);
        if(find().matches.length){
          swap(x,y,x,y+1);
          return true;
        }
        swap(x,y,x,y+1);
      }

    }
  }

  return false;
}

function init(){

  do{

    board = [];

    for(let y=0;y<size;y++){
      board[y]=[];

      for(let x=0;x<size;x++){

        let c;

        do{
          c = rand();

        }while(
          x>=2 &&
          board[y][x-1] === c &&
          board[y][x-2] === c ||

          y>=2 &&
          board[y-1][x] === c &&
          board[y-2][x] === c
        );

        board[y][x] = c;
      }
    }

  } while(!hasMove()); // ✅ ここが神ポイント
}


// ===== 描画 =====
const c=document.getElementById("game");
const ctx=c.getContext("2d");

function draw(){
  ctx.clearRect(0,0,300,300);

  // フラッシュ
  if(flash>0){
    ctx.fillStyle="rgba(255,255,255,"+flash+")";
    ctx.fillRect(0,0,300,300);
    flash-=0.05;
  }

  ctx.save();

  // シェイク
  if(shake>0){
    ctx.translate((Math.random()-0.5)*8,(Math.random()-0.5)*8);
    shake--;
  }

  // 落下描画
  fallAnim.forEach(f=>{
    let yPos=f.from+(f.to-f.from)*f.progress;
    ctx.drawImage(
      imgs[board[f.to][f.x]],
      f.x*cell+10,
      yPos*cell+10,
      40,40
    );
  });

  // 通常描画
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){

      if(fallAnim.some(f=>f.x===x&&f.to===y)) continue;

      let px=x*cell+10,py=y*cell+10;

      if(swapAnim){
        let a=swapAnim;
        let t=1-(1-a.progress)**2;

        if(x===a.x1&&y===a.y1){
          px+=(a.x2-a.x1)*cell*t;
          py+=(a.y2-a.y1)*cell*t;
        }
        if(x===a.x2&&y===a.y2){
          px+=(a.x1-a.x2)*cell*t;
          py+=(a.y1-a.y2)*cell*t;
        }
      }

      let b=board[y][x];
      ctx.drawImage(imgs[b],px,py,40,40);
    }
  }

  ctx.restore();
}

// ===== スワップ =====
function animateSwap(x1,y1,x2,y2,valid){
  swapAnim={x1,y1,x2,y2,progress:0,valid};
}

// ===== アニメ更新 =====
function updateAnim(){
  if(swapAnim){
    swapAnim.progress+=0.15;

    if(swapAnim.progress>=1){
      let a=swapAnim;

      let t=board[a.y1][a.x1];
      board[a.y1][a.x1]=board[a.y2][a.x2];
      board[a.y2][a.x2]=t;

      swapAnim=null;

      if(find().matches.length){
        moves--;
        update();
      }else if(a.valid){
        animateSwap(a.x2,a.y2,a.x1,a.y1,false);
      }
    }
  }

  fallAnim.forEach(f=>f.progress+=0.1);
  fallAnim=fallAnim.filter(f=>f.progress<1);
}

// ===== マッチ =====
function find(){
  let matches = [];
  let bombPos = null;

  // 横
  for(let y=0;y<size;y++){
    let count=1;
    for(let x=1;x<=size;x++){
      if(x<size && board[y][x]===board[y][x-1]){
        count++;
      } else {

        if(count>=3){
          for(let k=0;k<count;k++){
            matches.push({x:x-1-k,y});
          }
        }

        // ✅ 5個以上なら爆弾位置記録
        if(count>=5){
          bombPos = {x:x-1,y};
        }

        count=1;
      }
    }
  }

  // 縦
  for(let x=0;x<size;x++){
    let count=1;
    for(let y=1;y<=size;y++){
      if(y<size && board[y][x]===board[y-1][x]){
        count++;
      } else {

        if(count>=3){
          for(let k=0;k<count;k++){
            matches.push({x,y:y-1-k});
          }
        }

        if(count>=5){
          bombPos = {x,y:y-1};
        }

        count=1;
      }
    }
  }

  return {matches, bombPos};
}


// ===== 消し =====
function remove(m, bombPos){

  combo++;
  score += m.length * 10 * combo;

  flash = 0.5;
  shake = 10;

  // ✅ コンボ表示
  if(combo > 1){
    document.getElementById("combo").innerText =
      combo + " COMBO! 🔥";
    
    comboTimer = 120; // ✅ 約1秒表示（60フレーム）
  }

  m.forEach(p=>{
    board[p.y][p.x] = null;
  });

  if(bombPos){
    board[bombPos.y][bombPos.x] = "bomb";
  }
}



// ===== 落下 =====
function drop(){

  for(let x=0;x<size;x++){

    let stack=[];

    for(let y=size-1;y>=0;y--){
      if(board[y][x] !== null){
        stack.push(board[y][x]);
      }
    }

    for(let y=size-1;y>=0;y--){
      board[y][x] = stack.shift() || null;
    }
  }
}


// ===== 補充 =====
function fill(){
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      if(!board[y][x]) board[y][x]=rand();
    }
  }
}

// ===== スワップ =====
function swap(x1,y1,x2,y2){
  let t = board[y1][x1];
  board[y1][x1] = board[y2][x2];
  board[y2][x2] = t;
}

// ===== 爆弾 =====
function explode(x,y){
  for(let dy=-1; dy<=1; dy++){
    for(let dx=-1; dx<=1; dx++){
      let nx = x + dx;
      let ny = y + dy;

      if(nx>=0 && ny>=0 && nx<size && ny<size){
        board[ny][nx] = null;
      }
    }
  }
}

// ===== 更新 =====
let isGameOver = false;

function update(){

  // ✅ 手数0チェック
  if(moves <= 0){
    gameOver();
    return;
  }

  let data = find();
  let m = data.matches;

  if(m.length){

    remove(m, data.bombPos);

    drop();
    fill();
    setTimeout(update,200);

  } else {

    combo = 0;

    // ✅ 詰みチェックここ！！
    if(!hasMove()){

      // ✅ ここに入れる👇
      do{
        shuffle();
      } while(!hasMove());

      return;
    }
  }

  document.getElementById("score").innerText="Score:"+score;
  document.getElementById("moves").innerText="Moves:"+moves;
}

// ---- PC ----
let swipeStart = null;

// --- PC ---
c.addEventListener("mousedown", e=>{
  if(isGameOver) return;
  swipeStart = {
    x: Math.floor(e.offsetX / cell),
    y: Math.floor(e.offsetY / cell)
  };
});

c.addEventListener("mouseup", e=>{
  if(!swipeStart) return;

  let x = Math.floor(e.offsetX / cell);
  let y = Math.floor(e.offsetY / cell);

  let dx = x - swipeStart.x;
  let dy = y - swipeStart.y;

  // ✅ 爆弾タップ優先
  if(dx===0 && dy===0){
    if(board[y][x] === "bomb"){
      moves--;
      explode(x,y);
      update();
      swipeStart = null;
      return;
    }
  }

  // 通常スワップ
  if(Math.abs(dx)+Math.abs(dy)===1){
    let x1 = swipeStart.x;
    let y1 = swipeStart.y;

    swap(x1, y1, x, y);

    
  let result = find();

  if(result.matches.length > 0){
    moves--;
    update();
  } else {
    swap(x1, y1, x, y);
  }

  }

  swipeStart = null;
});

// --- スマホ ---
c.addEventListener("touchstart", e=>{
  e.preventDefault();
  if(isGameOver) return;
  let r = c.getBoundingClientRect();
  let t = e.touches[0];

  swipeStart = {
    x: Math.floor((t.clientX - r.left)/cell),
    y: Math.floor((t.clientY - r.top)/cell)
  };
});

c.addEventListener("touchend", e=>{
  e.preventDefault();
  if(!swipeStart) return;

  let r = c.getBoundingClientRect();
  let t = e.changedTouches[0];

  let x = Math.floor((t.clientX - r.left)/cell);
  let y = Math.floor((t.clientY - r.top)/cell);

  let dx = x - swipeStart.x;
  let dy = y - swipeStart.y;

  // ✅ 追加：その場タップ（爆弾発動）
  if(dx === 0 && dy === 0){
    if(board[y][x] === "bomb"){
      explode(x,y);
      update();
      swipeStart = null;
      return;
    }
  }

  // ✅ 通常スワップ
  if(Math.abs(dx)+Math.abs(dy)===1){

    let x1 = swipeStart.x;
    let y1 = swipeStart.y;

    // ✅ スワップ先が爆弾でも発動
    if(board[y][x] === "bomb"){
      explode(x,y);
      update();
    } else {

      swap(x1, y1, x, y);

      
    let result = find();

    if(result.matches.length > 0){
      moves--;
      update();
    } else {
      swap(x1, y1, x, y);
    }

    }
  }

  swipeStart = null;
});



// ===== ループ =====
function loop(){

  draw();
  updateAnim();

  // ✅ タイマーで消す
  if(comboTimer > 0){
    comboTimer--;
  } else {
    document.getElementById("combo").innerText = "";
  }

  requestAnimationFrame(loop);
}

function confirmAction(type){
  console.log("押された:", type); // ✅ デバッグ

  tempAction = type;

  let text = "";

  if(type === "retry"){
    text = "現在のゲームをやり直します。\nよろしいですか？";
  }

  if(type === "title"){
    text = "タイトルに戻ります。\n進行中のゲームは失われます。";
  }

  document.getElementById("confirmText").innerText = text;

  show("confirm");
}

function shuffle(){

  let arr = [];

  // ✅ 全部1次元に集める
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      arr.push(board[y][x]);
    }
  }

  // ✅ シャッフル
  for(let i=arr.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }

  // ✅ 盤面に戻す
  let i=0;
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      board[y][x] = arr[i++];
    }
  }
}
</script>
