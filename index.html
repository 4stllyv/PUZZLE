<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Match3 Ultimate</title>

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#ffb6f0,#a0cfff);
  text-align:center;
  font-family:sans-serif;
}

.screen{ display:none; }
.active{ display:block; }

h1{ color:white; }

.ui{
  display:flex;
  justify-content:space-between;
  width:300px;
  margin:0 auto;
  color:white;
  font-weight:bold;
}

canvas{
  margin-top:10px;
  border-radius:20px;
  background:rgba(255,255,255,0.2);
  touch-action:none;
}

#combo{
  color:white;
  font-size:20px;
}
</style>
</head>

<body>

<div id="title" class="screen active">
  <h1>🍬 Match3 Ultimate</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="gameScreen" class="screen">
  <h1>🍬 Match3</h1>

  <div class="ui">
    <div id="score">Score:0</div>
    <div id="moves">Moves:30</div>
  </div>
  <div id="combo"></div>

  <canvas id="game" width="300" height="300"></canvas>
</div>

<div id="result" class="screen">
  <h1>RESULT</h1>
  <div id="final"></div>
  <div id="rank"></div>

  <button onclick="retryGame()">RETRY</button>
  <button onclick="goTitle()">タイトルへ</button>
</div>

<script>
let started = false;

function startGame(){

  // ✅ 状態リセット
  score = 0;
  moves = 30;
  combo = 0;
  isGameOver = false;

  // ✅ UIリセット
  document.getElementById("score").innerText = "Score:0";
  document.getElementById("moves").innerText = "Moves:30";
  document.getElementById("combo").innerText = "";

  // ✅ 画面切り替え
  show("gameScreen");

  // ✅ 盤面初期化
  init();

    
  if(!started){
      loop();
      started = true;
    }
}


function retryGame(){

  // ✅ 状態リセット
  score = 0;
  moves = 30;
  combo = 0;
  isGameOver = false;

  // ✅ 盤面作り直し
  init();

  // ✅ UIリセット
  document.getElementById("score").innerText = "Score:0";
  document.getElementById("moves").innerText = "Moves:30";
  document.getElementById("combo").innerText = "";

  // ✅ ゲーム画面に戻る
  show("gameScreen");
}

function goTitle(){

  // ✅ 状態リセット
  score = 0;
  moves = 30;
  combo = 0;
  isGameOver = false;

  // ✅ 盤面クリア（これ重要）
  board = [];

  // ✅ UIリセット
  document.getElementById("score").innerText = "Score:0";
  document.getElementById("moves").innerText = "Moves:30";
  document.getElementById("combo").innerText = "";

  // ✅ タイトルへ
  show("title");
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function gameOver(){
  isGameOver = true;

  show("result");

  document.getElementById("final").innerText =
    "Score: " + score;

  // ランキング
  let r = JSON.parse(localStorage.getItem("rank") || "[]");
  r.push(score);
  r.sort((a,b)=>b-a);
  r = r.slice(0,5);
  localStorage.setItem("rank", JSON.stringify(r));

  document.getElementById("rank").innerText =
    "TOP5: " + r.join(",");
}

// ===== 素材 =====
const imgs={
 red:new Image(),blue:new Image(),
 green:new Image(),yellow:new Image(),
 purple:new Image(),bomb:new Image()
};

imgs.red.src="assets/red.png";
imgs.blue.src="assets/blue.png";
imgs.green.src="assets/green.png";
imgs.yellow.src="assets/yellow.png";
imgs.purple.src="assets/purple.png";
imgs.bomb.src="assets/bomb.png";

const sound=new Audio("assets/pop.mp3");

// ===== 状態 =====
const size=6,cell=50;
const colors=["red","blue","green","yellow","purple"];

let board=[],score=0,moves=30,combo=0;
let swapAnim=null,fallAnim=[];
let flash=0,shake=0;

// ===== 初期化 =====
function rand(){
  return colors[Math.floor(Math.random()*colors.length)];
}

function init(){
  for(let y=0;y<size;y++){
    board[y]=[];
    for(let x=0;x<size;x++){
      board[y][x]=rand();
    }
  }
}

// ===== 描画 =====
const c=document.getElementById("game");
const ctx=c.getContext("2d");

function draw(){
  ctx.clearRect(0,0,300,300);

  // フラッシュ
  if(flash>0){
    ctx.fillStyle="rgba(255,255,255,"+flash+")";
    ctx.fillRect(0,0,300,300);
    flash-=0.05;
  }

  ctx.save();

  // シェイク
  if(shake>0){
    ctx.translate((Math.random()-0.5)*8,(Math.random()-0.5)*8);
    shake--;
  }

  // 落下描画
  fallAnim.forEach(f=>{
    let yPos=f.from+(f.to-f.from)*f.progress;
    ctx.drawImage(
      imgs[board[f.to][f.x]],
      f.x*cell+10,
      yPos*cell+10,
      40,40
    );
  });

  // 通常描画
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){

      if(fallAnim.some(f=>f.x===x&&f.to===y)) continue;

      let px=x*cell+10,py=y*cell+10;

      if(swapAnim){
        let a=swapAnim;
        let t=1-(1-a.progress)**2;

        if(x===a.x1&&y===a.y1){
          px+=(a.x2-a.x1)*cell*t;
          py+=(a.y2-a.y1)*cell*t;
        }
        if(x===a.x2&&y===a.y2){
          px+=(a.x1-a.x2)*cell*t;
          py+=(a.y1-a.y2)*cell*t;
        }
      }

      let b=board[y][x];
      ctx.drawImage(imgs[b],px,py,40,40);
    }
  }

  ctx.restore();
}

// ===== スワップ =====
function animateSwap(x1,y1,x2,y2,valid){
  swapAnim={x1,y1,x2,y2,progress:0,valid};
}

// ===== アニメ更新 =====
function updateAnim(){
  if(swapAnim){
    swapAnim.progress+=0.15;

    if(swapAnim.progress>=1){
      let a=swapAnim;

      let t=board[a.y1][a.x1];
      board[a.y1][a.x1]=board[a.y2][a.x2];
      board[a.y2][a.x2]=t;

      swapAnim=null;

      if(find().length){
        moves--;
        update();
      }else if(a.valid){
        animateSwap(a.x2,a.y2,a.x1,a.y1,false);
      }
    }
  }

  fallAnim.forEach(f=>f.progress+=0.1);
  fallAnim=fallAnim.filter(f=>f.progress<1);
}

// ===== マッチ =====
function find(){
  let set=new Set();

  for(let y=0;y<size;y++){
    let count=1;
    for(let x=1;x<=size;x++){
      if(x<size && board[y][x]===board[y][x-1]) count++;
      else{
        if(count>=3){
          for(let k=0;k<count;k++){
            set.add(y*size+(x-1-k));
          }
        }
        count=1;
      }
    }
  }

  for(let x=0;x<size;x++){
    let count=1;
    for(let y=1;y<=size;y++){
      if(y<size && board[y][x]===board[y-1][x]) count++;
      else{
        if(count>=3){
          for(let k=0;k<count;k++){
            set.add((y-1-k)*size+x);
          }
        }
        count=1;
      }
    }
  }

  return [...set].map(i=>({x:i%size,y:Math.floor(i/size)}));
}

// ===== 消し =====
function remove(m){
  combo++;
  score+=m.length*10*combo;
  flash=0.5;
  shake=10;

  document.getElementById("combo").innerText=
    combo>1?combo+" COMBO!":"";

  m.forEach(p=>{
    board[p.y][p.x]=null;
  });

  sound.currentTime=0;
  sound.play();
}

// ===== 落下 =====
function drop(){
  fallAnim=[];

  for(let x=0;x<size;x++){
    for(let y=size-1;y>=0;y--){
      if(!board[y][x]){
        for(let k=y-1;k>=0;k--){
          if(board[k][x]){
            board[y][x]=board[k][x];
            board[k][x]=null;

            fallAnim.push({x,from:k,to:y,progress:0});
            break;
          }
        }
      }
    }
  }
}

// ===== 補充 =====
function fill(){
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      if(!board[y][x]) board[y][x]=rand();
    }
  }
}

// ===== スワップ =====
function swap(x1,y1,x2,y2){
  let t = board[y1][x1];
  board[y1][x1] = board[y2][x2];
  board[y2][x2] = t;
}

// ===== 爆弾 =====
function explode(x,y){
  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){
      let nx=x+dx, ny=y+dy;
      if(nx>=0 && ny>=0 && nx<size && ny<size){
        board[ny][nx] = null;
      }
    }
  }
}

// ===== 更新 =====
let isGameOver = false;

function update(){
  let m=find();

  if(m.length){
    remove(m);
    drop();
    fill();
    setTimeout(update,200);
  }else{
    combo=0;
    if(moves <= 0){
      gameOver();
      return;
    }
  }

  document.getElementById("score").innerText="Score:"+score;
  document.getElementById("moves").innerText="Moves:"+moves;
}

// ---- PC ----
let swipeStart = null;

// --- PC ---
c.addEventListener("mousedown", e=>{
  if(isGameOver) return;
  swipeStart = {
    x: Math.floor(e.offsetX / cell),
    y: Math.floor(e.offsetY / cell)
  };
});

c.addEventListener("mouseup", e=>{
  if(!swipeStart) return;

  let x = Math.floor(e.offsetX / cell);
  let y = Math.floor(e.offsetY / cell);

  let dx = x - swipeStart.x;
  let dy = y - swipeStart.y;

  if(Math.abs(dx)+Math.abs(dy)===1){

    let x1 = swipeStart.x;
    let y1 = swipeStart.y;

    // ✅ 爆弾優先
    if(board[y][x] === "bomb"){
      explode(x,y);
      update();
    } else {

      // ✅ 仮スワップ
      swap(x1, y1, x, y);

      // ✅ マッチチェック
      if(find().length > 0){
        moves--;
        update();   // OKなら確定
      } else {
        // ❌ ダメなら戻す
        swap(x1, y1, x, y);
      }

    }
  }

  swipeStart = null;
});

// --- スマホ ---
c.addEventListener("touchstart", e=>{
  if(isGameOver) return;
  let r = c.getBoundingClientRect();
  let t = e.touches[0];

  swipeStart = {
    x: Math.floor((t.clientX - r.left)/cell),
    y: Math.floor((t.clientY - r.top)/cell)
  };
});

c.addEventListener("touchend", e=>{
  if(!swipeStart) return;

  let r = c.getBoundingClientRect();
  let t = e.changedTouches[0];

  let x = Math.floor((t.clientX - r.left)/cell);
  let y = Math.floor((t.clientY - r.top)/cell);

  let dx = x - swipeStart.x;
  let dy = y - swipeStart.y;

  if(Math.abs(dx)+Math.abs(dy)===1){

    let x1 = swipeStart.x;
    let y1 = swipeStart.y;

    if(board[y][x] === "bomb"){
      explode(x,y);
      update();
    } else {

      swap(x1, y1, x, y);

      if(find().length > 0){
        moves--;
        update();
      } else {
        swap(x1, y1, x, y);
      }
    }
  }

  swipeStart = null;
});


// ===== ループ =====
function loop(){
  draw();
  updateAnim();
  requestAnimationFrame(loop);
}

// ===== 起動 =====
function startGame(){
  document.getElementById("title").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");

  init();
  loop();
}
</script>

</body>
</html>
